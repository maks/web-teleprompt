<div id="prompterControls">
  <label for="speedSlider">Speed:</label>
  <input type="range" id="speedSlider" min="1" max="100" value="10">
  <span id="speedLabel">25</span>
  <label id="wakeLockLabel"><input type="checkbox" id="wakeLockToggle"> Keep screen awake</label>
  <button id="pauseBtn">Pause</button>
  <button id="exitBtn">✕ Exit</button>
</div>
<div id="prompterContent">
  <div id="prompterText"></div>
</div>
