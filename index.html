<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Teleprompter</title>
<meta name="theme-color" content="#16213e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eee;
    --text2: #aaa;
    --radius: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Editor View ── */
  #editorView {
    display: flex;
    height: 100vh;
    height: 100dvh;
  }

  #sidebar {
    width: clamp(210px, 26vw, 260px);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  #sidebar h2 {
    padding: 18px 16px 10px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
  }

  #newScriptBtn {
    margin: 0 12px 12px;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: opacity .2s;
  }

  #newScriptBtn:hover {
    opacity: .85;
  }

  #scriptList {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    padding: 0 8px 12px;
  }

  #scriptList li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }

  #scriptList li:hover {
    background: var(--surface2);
  }

  #scriptList li.active {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
  }

  #scriptList li .scriptName {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
  }

  #scriptList li .deleteBtn {
    visibility: hidden;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  #scriptList li:hover .deleteBtn {
    visibility: visible;
  }

  #scriptList li .deleteBtn:hover {
    background: rgba(233, 69, 96, .2);
  }

  #mainEditor {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
  }

  #toolbar label {
    font-size: 13px;
    color: var(--text2);
  }

  #toolbar select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }

  #teleprompterBtn {
    margin-left: auto;
    padding: 8px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: opacity .2s;
  }

  #teleprompterBtn:hover {
    opacity: .85;
  }

  #titleInput {
    padding: 14px 20px 0;
    font-size: 22px;
    font-weight: 700;
    background: none;
    border: none;
    color: var(--text);
    outline: none;
    width: 100%;
  }

  #titleInput::placeholder {
    color: var(--text2);
  }

  #editor {
    flex: 1;
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.7;
    background: none;
    border: none;
    color: var(--text);
    outline: none;
    resize: none;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  #editor::placeholder {
    color: var(--text2);
  }

  /* empty state */
  #emptyState {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text2);
    font-size: 18px;
  }

  #emptyState.visible {
    display: flex;
  }

  #editorView.hidden {
    display: none;
  }

  @media (max-width: 700px) {
    #editorView {
      flex-direction: column;
    }

    #sidebar {
      width: 100%;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-right: none;
      border-bottom: 1px solid var(--surface2);
    }

    #sidebar h2 {
      display: none;
    }

    #newScriptBtn {
      margin: 0;
      flex-shrink: 0;
      padding: 8px 14px;
    }

    #scriptList {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
    }

    #scriptList li {
      flex-shrink: 0;
      margin-bottom: 0;
      padding: 8px 10px;
      gap: 8px;
      max-width: 45vw;
    }

    #scriptList li.active {
      border-left: none;
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    #titleInput {
      padding: 12px 16px 0;
      font-size: 18px;
    }

    #editor {
      padding: 12px 16px;
      font-size: 16px;
    }
  }

  @media (hover: none) {
    #scriptList li .deleteBtn {
      visibility: visible;
    }
  }
</style>
</head>

<body>

<!-- ── Editor View ── -->
<div id="editorView">
  <div id="sidebar">
    <h2>Scripts</h2>
    <button id="newScriptBtn"><span>New Script</span></button>
    <ul id="scriptList"></ul>
  </div>
  <div id="mainEditor">
    <div id="toolbar">
      <button id="teleprompterBtn" disabled>▶ Teleprompter</button>
    </div>
    <input id="titleInput" type="text" placeholder="Script title…">
    <textarea id="editor" placeholder="Write your script here…&#10;&#10;# Heading 1&#10;## Heading 2&#10;**bold text**&#10;*italic text*&#10;- bullet point"></textarea>
    <div id="emptyState">
      <p>No scripts yet</p>
      <p style="margin-top:8px;font-size:14px">Click "New Script" to get started</p>
    </div>
  </div>
</div>

<!-- ── Teleprompter View ── -->
<teleprompter-view id="prompter"></teleprompter-view>

<script type="module" src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
